server {
    server_name admin.xentrasports.com;

    # ✅ NEW: Serve Next.js static chunks directly from Nginx (NOT proxied to Node.js)
    location /_next/static/ {
        alias /var/www/xentra-admin-dashboard/.next/static/;
        expires 365d;
        add_header Cache-Control "public, immutable, max-age=31536000";
        add_header X-Served-By "nginx-static" always;
        access_log off;
        try_files $uri =404;
    }

    # ✅ NEW: Serve public folder directly
    location /public/ {
        root /var/www/xentra-admin-dashboard;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
        try_files $uri =404;
    }

    # Original proxy (now only for dynamic content)
    location / {
        proxy_pass http://localhost:3000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Add timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/admin.xentrasports.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/admin.xentrasports.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = admin.xentrasports.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name admin.xentrasports.com;
    return 404; # managed by Certbot
}
